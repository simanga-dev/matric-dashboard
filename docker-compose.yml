services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-matric_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-matric}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matric} -d ${POSTGRES_DB:-matric_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required};
      mc mb --ignore-existing local/${FILE_STORAGE_BUCKET:-matric-dasbhoard-files};
      mc anonymous set download local/${FILE_STORAGE_BUCKET:-matric-dasbhoard-files};
      echo 'Bucket created';
      exit 0;
      "

  api:
    build:
      context: src/backend
      dockerfile: MatricDasbhoard.WebApi/Dockerfile
    environment:
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=${POSTGRES_DB:-matric_dashboard};Username=${POSTGRES_USER:-matric};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      Authentication__Jwt__Key: ${JWT_SECRET:?JWT_SECRET is required}
      Authentication__ExternalProviders__EncryptionKey: ${EXT_AUTH_ENCRYPTION_KEY:?EXT_AUTH_ENCRYPTION_KEY is required}
      FileStorage__Endpoint: http://minio:9000
      FileStorage__AccessKey: ${MINIO_ROOT_USER:-admin}
      FileStorage__SecretKey: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      FileStorage__BucketName: ${FILE_STORAGE_BUCKET:-matric-dasbhoard-files}
      FileStorage__UseSSL: "false"
      Email__Enabled: ${EMAIL_ENABLED:-false}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-noreply@example.com}
      Email__FromName: ${EMAIL_FROM_NAME:-MatricDasbhoard}
      Email__FrontendBaseUrl: ${FRONTEND_URL:-http://localhost:3000}
      Email__Smtp__Host: ${SMTP_HOST:-}
      Email__Smtp__Port: ${SMTP_PORT:-587}
      Email__Smtp__Username: ${SMTP_USERNAME:-}
      Email__Smtp__Password: ${SMTP_PASSWORD:-}
      Email__Smtp__UseSsl: ${SMTP_USE_SSL:-false}
      Captcha__SecretKey: ${TURNSTILE_SECRET_KEY:-}
      Cors__AllowAllOrigins: ${CORS_ALLOW_ALL:-false}
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost:3000}
      Hosting__ForceHttps: "false"
      Hosting__ReverseProxy__TrustedNetworks__0: 0.0.0.0/0
      ASPNETCORE_URLS: http://+:8080
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/healthprobe/HealthProbe"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: src/frontend
      dockerfile: Dockerfile
    environment:
      API_URL: http://api:8080
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
